name: Feature Request
description: SimpliesBot TTS への機能追加・改善案を提案します
title: "[機能リクエスト]: "
labels:
  - 機能リクエスト

body:
  - type: markdown
    attributes:
      value: |
        SimpliesBot TTS への機能リクエストありがとうございます。
        いただいた内容は今後の改善・開発の参考にさせていただきます。

  - type: textarea
    id: feature_description
    attributes:
      label: 提案内容
      description: 追加してほしい機能や改善してほしい内容を記載してください。
      placeholder: |
        例:
        読み上げ速度をユーザーごとに設定できるようにしてほしい
        特定のチャンネルでは読み上げを無効にしたい
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 必要だと思う理由(任意)
      description: なぜその機能・改善が必要だと思いますか？
      placeholder: |
        例:
        サーバーによって利用スタイルが違うため、より細かく設定できると便利だから

  - type: textarea
    id: expected_behavior
    attributes:
      label: 期待する動作
      description: 実装された場合、どのように動いてほしいですか？
      placeholder: |
        例:
        /settings から読み上げ速度を変更できる
        管理者がチャンネルごとにON/OFFを設定できる
    validations:
      required: true

  - type: textarea
    id: others
    attributes:
      label: その他
      description: 補足や参考情報があれば記載してください。
      placeholder: |
        参考画像、具体例、似ている機能など

  - type: checkboxes
    id: confirmations
    attributes:
      label: 確認事項
      options:
        - label: 同様のIssueが存在しないことを確認しました
          required: true
