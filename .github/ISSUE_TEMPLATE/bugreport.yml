name: Bug Report
description: SimpliesBot TTS の不具合を報告します
title: "[バグ]: "
labels:
  - バグ

body:
  - type: markdown
    attributes:
      value: |
        SimpliesBot TTS の不具合報告ありがとうございます。
        できるだけ詳しく記載していただけると、調査がスムーズになります。

  - type: textarea
    id: bug_description
    attributes:
      label: 不具合の内容
      description: どのような問題が発生していますか？
      placeholder: |
        例:
        読み上げが途中で止まる
        VCへ接続できない
        音声生成が失敗する
    validations:
      required: true

  - type: textarea
    id: reproduce_steps
    attributes:
      label: 再現手順
      description: 不具合を再現する方法を記載してください
      placeholder: |
        1. /join を実行
        2. メッセージを送信
        3. 読み上げが開始されない
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 本来期待される動作
      placeholder: |
        正常に読み上げが開始される
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: ログ・エラー内容
      description: エラーログやスクリーンショットなど
      render: shell
      placeholder: |
        ERROR: Unknown interaction
        VoiceboxAPI timeout
        
  - type: textarea
    id: others
    attributes:
      label: その他
      description: その他書きたいことがあったら書いてください。
      render: shell

  - type: dropdown
    id: bot_type
    attributes:
      label: 使用ボット
      options:
        - SimpliesBot TTS
        - SimpliesBot TTS Sub1
        - SimpliesBot TTS Sub2
        - SimpliesBot TTS Sub3
        - SimpliesBot TTS Sub4
        - SimpliesBot TTS Sub5
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: 確認事項
      options:
        - label: 同様のIssueが存在しないことを確認しました
          required: true
